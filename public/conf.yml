    url: https://blog.nichx.cn/
    icon: lucide:pen-tool
  - text: EMBY
    url: https://v.nichx.cn:8821/
    icon: lucide:film
  - text: Photos
    url: https://photo.nichx.cn:5045
    icon: lucide:image
  - text: 下载
    url: https://dl.nichx.cn:8084/
    icon: lucide:download
  - text: UNRAID
    url: https://nas.nichx.cn:8443
