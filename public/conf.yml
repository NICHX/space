# ============================
# 导航页完整配置
# 修改此文件后刷新页面即可生效，无需重新构建
# ============================

# 网站标题（浏览器标签栏）
html_title: NICHX导航页

# Logo 文字
logo: Hi!

# 用户名（可选，设置后在问候语中显示）
username: NICHX

# 座右铭（留空会自动获取一言）
motto:

# 底部版权信息
copyright: ©2026 - 导航页 | NICHX | 陕ICP备16019327号

# Logo 渐变色（可选，CSS 渐变值，如 "linear-gradient(135deg, #667eea, #764ba2)"）
# logo_gradient:

# ============================
# 主题配置
# ============================
theme:
  # 导航格子列数 2-8
  grid_columns: 5
  # 悬停效果（up/scale/glow/rotate/shine/lift/pulse/random）
  hover_effect: random
  # 导航方块背景
  nav_bg: false

# ============================
# 背景配置
# ============================
background:
  # 壁纸来源：picsum / custom
  wallpaper_source: picsum
  # 自定义壁纸 URL（wallpaper_source 为 custom 时生效）
  custom_wallpaper_url:

# ============================
# 搜索配置
# ============================
search:
  default_engine: baidu
  engines:
    google: "https://www.google.com/search?q="
    bing: "https://www.bing.com/search?q="
    baidu: "https://www.baidu.com/s?wd="
    duckduckgo: "https://duckduckgo.com/?q="
  # 搜索引擎显示标签（可选，不填自动从 URL 推断）
  engine_labels:
    google: Google
    bing: Bing
    baidu: 百度
    duckduckgo: DuckDuckGo

# 导航链接列表
# 每个链接包含以下字段：
#   title    - 显示名称（必填）
#   url      - 链接地址（必填）
#   icon     - 图标（可选，支持两种来源）：
#             1) simpleicons 品牌图标：https://simpleicons.org/ 查看预览，
#                图标名使用每个图标页显示的 "slug"（如 github、docker、apple）
#             2) lucide 图标：https://lucide.dev/icons/ 查看预览，
#                图标名使用 URL 末尾的名称（如 cloud、server、settings）
#             不填则使用默认 link 图标
links:
  - text: 哔哩哔哩
    url: https://www.bilibili.com/
    icon: simple:bilibili
  - text: 值得买
    url: https://www.smzdm.com/
